name: Release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs_on: ubuntu-24.04
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
          - name: windows-x64
            runs_on: windows-2025
          - name: macos-arm64
            runs_on: macos-15
          - name: macos-x64
            runs_on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            unzip \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version alignment
        shell: bash
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          LAUNCHER_VERSION=$(node -p "require('./packages/howcode/package.json').version")
          ELECTROBUN_VERSION=$(node -e "const fs=require('node:fs'); const text=fs.readFileSync('electrobun.config.ts','utf8'); const match=text.match(/version:\s*\"([^\"]+)\"/); if(!match) process.exit(1); process.stdout.write(match[1]);")
          if [ "$ROOT_VERSION" != "$LAUNCHER_VERSION" ] || [ "$ROOT_VERSION" != "$ELECTROBUN_VERSION" ]; then
            echo "Version mismatch detected"
            echo "root=$ROOT_VERSION launcher=$LAUNCHER_VERSION electrobun=$ELECTROBUN_VERSION"
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$ROOT_VERSION" != "$TAG_VERSION" ]; then
              echo "Tag version $TAG_VERSION does not match package version $ROOT_VERSION"
              exit 1
            fi
          fi

      - name: Build stable desktop release
        run: bun run build:release

      - name: Build launcher archives
        run: bun run build:launcher-artifacts

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          if-no-files-found: error
          path: |
            artifacts/*
            !artifacts/npm-launcher
            artifacts/npm-launcher/*

  publish-release:
    name: Publish GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -lah release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
